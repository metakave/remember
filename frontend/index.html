<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>REMEMBER</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-bg-hover: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.06);
        --glass-border-focus: rgba(99, 102, 241, 0.4);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-primary: #6366f1; /* Indigo */
        --accent-secondary: #a855f7; /* Purple */
        --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        --success: #10b981;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background: #020617;
        color: var(--text-primary);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Mobile Device Container */
      .app-container {
        width: 100%;
        max-width: 480px;
        height: 100vh;
        max-height: 900px;
        background: var(--bg-gradient);
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      @media (min-width: 481px) {
        .app-container {
          border-radius: 40px;
          height: 85vh;
        }
      }

      /* Header Area */
      .app-header {
        padding: 24px 20px 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        backdrop-filter: blur(10px);
        background: rgba(11, 15, 25, 0.4);
        border-bottom: 1px solid var(--glass-border);
        z-index: 10;
      }

      .app-header h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 20px;
        font-weight: 700;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Scrollable Content */
      .app-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px 20px 100px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scrollbar-width: none; /* Firefox */
      }

      .app-content::-webkit-scrollbar {
        display: none; /* Safari/Webkit */
      }

      /* Glassmorphism Cards */
      .glass-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 20px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }

      .glass-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
        pointer-events: none;
      }

      .glass-card:hover {
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
        background: var(--glass-bg-hover);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .card-title {
        font-family: 'Outfit', sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: 0.5px;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .card-content {
        color: #e2e8f0;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .large-display-card {
        display: flex;
        flex-direction: column;
      }

      .large-display-card .card-content {
        flex: 1;
        font-size: 15px;
        line-height: 1.7;
        color: #f1f5f9;
        min-height: 5.1em; /* Ensures at least 3 lines of text height (3 * 1.7) */
      }

      .vision-glow {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%) !important;
        border-color: rgba(99, 102, 241, 0.2);
      }
      .vision-glow:hover {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%) !important;
        border-color: rgba(99, 102, 241, 0.35);
      }

      .mission-glow {
        background: linear-gradient(135deg, rgba(168, 85, 247, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%) !important;
        border-color: rgba(168, 85, 247, 0.2);
      }
      .mission-glow:hover {
        background: linear-gradient(135deg, rgba(168, 85, 247, 0.12) 0%, rgba(255, 255, 255, 0.04) 100%) !important;
        border-color: rgba(168, 85, 247, 0.35);
      }

      /* Form Fields */
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .form-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .form-input {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 12px 16px;
        color: var(--text-primary);
        font-size: 14px;
        transition: all 0.2s ease;
        outline: none;
      }

      .form-input:focus {
        border-color: var(--accent-primary);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      textarea.form-input {
        min-height: 200px;
        resize: vertical;
      }

      .btn {
        background: var(--accent-gradient);
        border: none;
        border-radius: 12px;
        padding: 12px 24px;
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn:hover {
        opacity: 0.95;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        color: var(--text-primary);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        box-shadow: none;
      }

      /* Bottom Navigation Bar */
      .bottom-nav {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 72px;
        background: rgba(11, 15, 25, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--glass-border);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        align-items: center;
        z-index: 10;
        padding: 0 10px;
      }

      @media (min-width: 481px) {
        .bottom-nav {
          border-bottom-left-radius: 40px;
          border-bottom-right-radius: 40px;
        }
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 10px;
        font-weight: 600;
        gap: 4px;
        cursor: pointer;
        transition: all 0.2s ease;
        background: none;
        border: none;
        width: 100%;
        height: 100%;
      }

      .nav-item svg {
        width: 22px;
        height: 22px;
        transition: all 0.2s ease;
      }

      .nav-item.active {
        color: var(--accent-primary);
      }

      .nav-item.active svg {
        transform: translateY(-2px);
        color: var(--accent-primary);
      }

      /* Home Grid/Dashboard */
      .dashboard-welcome {
        margin-bottom: 8px;
      }

      .dashboard-welcome h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 24px;
        font-weight: 700;
      }

      .dashboard-welcome p {
        font-size: 14px;
        color: var(--text-secondary);
      }

      /* Goals Layout */
      .goal-timeframe-tag {
        font-size: 10px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .tag-yearly { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
      .tag-quarterly { background: rgba(168, 85, 247, 0.15); color: #c084fc; }
      .tag-monthly { background: rgba(236, 72, 153, 0.15); color: #f472b6; }
      .tag-weekly { background: rgba(16, 185, 129, 0.15); color: #34d399; }

      /* Reminders Checklist */
      .reminder-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 16px;
      }

      .reminder-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        transition: all 0.2s ease;
      }

      .reminder-item:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
      }

      .reminder-checkbox {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 2px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reminder-item.completed .reminder-checkbox {
        background: var(--success);
        border-color: var(--success);
      }

      .reminder-item.completed .reminder-text {
        text-decoration: line-through;
        color: var(--text-secondary);
      }

      .reminder-text {
        flex: 1;
        font-size: 14px;
        font-weight: 500;
      }

      .btn-delete {
        background: none;
        border: none;
        color: #f43f5e;
        cursor: pointer;
        opacity: 0.6;
        transition: all 0.2s ease;
        padding: 4px;
      }

      .btn-delete:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      /* Empty State */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px;
        color: var(--text-secondary);
        gap: 12px;
      }

      .empty-state svg {
        opacity: 0.4;
      }

    </style>
  </head>
  <body>
    <div id="main"></div>
  </body>
</html>
